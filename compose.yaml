name: trygghetsnod

# Minimal Docker-stack: bara Kiwix-servern för ZIM-innehåll.
# Portalen och admin-appen körs nativt med Node under utveckling.
# Portalen når Kiwix via http://localhost:8090 (config.json).

services:
  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:3.8.1
    container_name: trygghetsnod_kiwix
    restart: unless-stopped
    command:
      - "--library"
      - "/data/kiwix-library.xml"
      - "--monitorLibrary"
      - "--address=all"
    volumes:
      - ./storage/zim:/data:ro
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/catalog/v2/entries || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
