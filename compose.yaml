name: trygghetsnod

# Docker-stack: Kiwix-serve (ZIM-bibliotek) + Postgres (forum/chat).
# Portalen och admin-appen körs nativt med Node under utveckling.

services:
  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:3.8.1
    container_name: trygghetsnod_kiwix
    restart: unless-stopped
    command:
      - "--library"
      - "/data/kiwix-library.xml"
      - "--monitorLibrary"
      - "--address=all"
    volumes:
      - ./storage/zim:/data:ro
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/catalog/v2/entries || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: trygghetsnod_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trygghetsnod
      POSTGRES_PASSWORD: trygghetsnod_local
      POSTGRES_DB: trygghetsnod
    volumes:
      - ./storage/postgres:/var/lib/postgresql/data
    # Port 5433 på host — undviker kollision med macOS Postgres.app m.fl.
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trygghetsnod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
